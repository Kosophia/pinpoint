
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  .app { font-family: 'DM Sans', sans-serif; color: var(--color-text-primary); padding: 2rem 1.5rem; max-width: 780px; margin: 0 auto; }

  /* Login screen */
  .login-screen {
    min-height: 60vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center; gap: 1.5rem;
  }
  .login-screen h1 { font-family: 'Playfair Display', serif; font-size: 30px; font-weight: 600; }
  .login-screen p { font-size: 14px; color: var(--color-text-secondary); max-width: 320px; line-height: 1.6; }
  .login-input-row { display: flex; gap: 8px; width: 100%; max-width: 360px; }
  .login-input-row input { flex: 1; padding: 10px 14px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); font-family: 'DM Sans', sans-serif; font-size: 14px; background: var(--color-background-secondary); color: var(--color-text-primary); }
  .login-input-row input:focus { outline: none; border-color: var(--color-border-primary); background: var(--color-background-primary); }
  .login-btn { padding: 10px 20px; border-radius: var(--border-radius-md); background: var(--color-text-primary); color: var(--color-background-primary); border: none; cursor: pointer; font-size: 14px; font-weight: 500; font-family: 'DM Sans', sans-serif; white-space: nowrap; }
  .login-btn:hover { opacity: 0.85; }
  .saved-users { width: 100%; max-width: 360px; }
  .saved-users-label { font-size: 12px; color: var(--color-text-tertiary); margin-bottom: 8px; text-align: left; }
  .saved-user-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .saved-user-chip { padding: 5px 14px; border-radius: 999px; border: 0.5px solid var(--color-border-tertiary); background: transparent; cursor: pointer; font-size: 13px; color: var(--color-text-secondary); font-family: 'DM Sans', sans-serif; }
  .saved-user-chip:hover { background: var(--color-background-secondary); color: var(--color-text-primary); }

  /* Main app */
  .main-screen { display: none; }
  .main-screen.visible { display: block; }
  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
  .topbar-left h1 { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 600; }
  .topbar-left p { font-size: 13px; color: var(--color-text-secondary); margin-top: 2px; }
  .switch-user-btn { padding: 6px 14px; border-radius: 999px; border: 0.5px solid var(--color-border-tertiary); background: transparent; cursor: pointer; font-size: 13px; color: var(--color-text-secondary); font-family: 'DM Sans', sans-serif; }
  .switch-user-btn:hover { background: var(--color-background-secondary); }

  .year-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 2rem; }
  .year-tab { padding: 6px 16px; border-radius: 999px; border: 0.5px solid var(--color-border-tertiary); background: transparent; cursor: pointer; font-size: 13px; font-family: 'DM Sans', sans-serif; color: var(--color-text-secondary); transition: all 0.15s; }
  .year-tab:hover { background: var(--color-background-secondary); color: var(--color-text-primary); }
  .year-tab.active { background: var(--color-text-primary); color: var(--color-background-primary); border-color: var(--color-text-primary); }
  .year-tab.add-btn { border-style: dashed; color: var(--color-text-tertiary); }

  .entry-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.5rem; margin-bottom: 1.5rem; }
  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; }
  .card-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 600; }
  .delete-btn { background: none; border: none; cursor: pointer; color: var(--color-text-tertiary); font-size: 16px; padding: 2px 6px; border-radius: 4px; }
  .delete-btn:hover { background: var(--color-background-secondary); color: #E24B4A; }

  .exp-type-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 1.25rem; }
  .exp-type-btn { padding: 10px; border-radius: 8px; border: 0.5px solid var(--color-border-tertiary); background: var(--color-background-secondary); cursor: pointer; font-size: 13px; font-weight: 500; font-family: 'DM Sans', sans-serif; color: var(--color-text-secondary); transition: all 0.15s; text-align: left; display: flex; align-items: center; gap: 8px; }
  .exp-type-btn:hover { border-color: var(--color-border-primary); color: var(--color-text-primary); }
  .exp-type-btn.selected { background: var(--color-background-info); color: var(--color-text-info); border-color: var(--color-border-info); }
  .type-icon { font-size: 15px; }

  .section-label { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; color: var(--color-text-tertiary); text-transform: uppercase; margin-bottom: 6px; margin-top: 1rem; }
  textarea, input[type=text] { width: 100%; padding: 10px 12px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--color-text-primary); background: var(--color-background-secondary); resize: vertical; line-height: 1.6; }
  textarea:focus, input[type=text]:focus { outline: none; border-color: var(--color-border-secondary); background: var(--color-background-primary); }

  .detail-sections { display: none; }
  .detail-sections.visible { display: block; }

  .people-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  .person-tag { display: flex; align-items: center; gap: 4px; background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: 999px; padding: 3px 10px; font-size: 12px; color: var(--color-text-secondary); }
  .person-tag button { background: none; border: none; cursor: pointer; color: var(--color-text-tertiary); font-size: 13px; line-height: 1; padding: 0 0 0 2px; }
  .add-person-row { display: flex; gap: 8px; margin-top: 6px; }
  .add-person-row input { flex: 1; }
  .add-person-btn { padding: 8px 14px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary); background: transparent; cursor: pointer; font-size: 13px; font-family: 'DM Sans', sans-serif; color: var(--color-text-primary); white-space: nowrap; }
  .add-person-btn:hover { background: var(--color-background-secondary); }

  .highlight-box { background: var(--color-background-warning); border: 0.5px solid var(--color-border-warning); border-radius: var(--border-radius-md); padding: 10px 14px; margin-top: 6px; }
  .highlight-box textarea { background: transparent; border: none; padding: 0; font-size: 14px; color: var(--color-text-warning); }
  .highlight-box textarea:focus { border: none; background: transparent; }
  .reflection-box { background: var(--color-background-info); border: 0.5px solid var(--color-border-info); border-radius: var(--border-radius-md); padding: 10px 14px; margin-top: 6px; }
  .reflection-box textarea { background: transparent; border: none; padding: 0; font-size: 14px; color: var(--color-text-info); }
  .reflection-box textarea:focus { border: none; background: transparent; }

  .add-entry-btn { width: 100%; padding: 12px; border: 0.5px dashed var(--color-border-secondary); border-radius: var(--border-radius-lg); background: transparent; cursor: pointer; font-size: 14px; font-family: 'DM Sans', sans-serif; color: var(--color-text-secondary); margin-bottom: 2rem; transition: all 0.15s; }
  .add-entry-btn:hover { background: var(--color-background-secondary); color: var(--color-text-primary); }

  .save-bar { position: sticky; bottom: 0; background: var(--color-background-primary); border-top: 0.5px solid var(--color-border-tertiary); padding: 1rem 0 0.5rem; display: flex; gap: 10px; align-items: center; margin-top: 1rem; }
  .save-btn { padding: 10px 24px; border-radius: var(--border-radius-md); background: var(--color-text-primary); color: var(--color-background-primary); border: none; cursor: pointer; font-size: 14px; font-weight: 500; font-family: 'DM Sans', sans-serif; }
  .save-btn:hover { opacity: 0.85; }
  .save-note { font-size: 12px; color: var(--color-text-tertiary); }
  .empty-state { text-align: center; padding: 3rem 1rem; color: var(--color-text-tertiary); font-size: 14px; }
</style>

<h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;">Life experience journal — enter your name to access your personal journal.</h2>

<div class="app">

  <!-- Login screen -->
  <div class="login-screen" id="loginScreen">
    <div>
      <h1>My Experience Journal</h1>
      <p>Enter your name to open your personal journal. Each person gets their own private space on this device.</p>
    </div>
    <div class="login-input-row">
      <input type="text" id="nameInput" placeholder="Your name..." maxlength="40" />
      <button class="login-btn" id="loginBtn">Enter</button>
    </div>
    <div class="saved-users" id="savedUsersSection" style="display:none;">
      <div class="saved-users-label">Previously saved on this device:</div>
      <div class="saved-user-chips" id="savedUserChips"></div>
    </div>
  </div>

  <!-- Main app screen -->
  <div class="main-screen" id="mainScreen">
    <div class="topbar">
      <div class="topbar-left">
        <h1 id="mainTitle">Journal</h1>
        <p id="mainSubtitle"></p>
      </div>
      <button class="switch-user-btn" id="switchUserBtn">Switch user</button>
    </div>

    <div class="year-tabs" id="yearTabs"></div>
    <div id="entriesContainer"></div>
    <button class="add-entry-btn" id="addEntryBtn">+ Add experience for <span id="addEntryYear"></span></button>

    <div class="save-bar">
      <button class="save-btn" id="saveBtn">Save all</button>
      <span class="save-note" id="saveNote">Changes are saved locally to this device.</span>
    </div>
  </div>
</div>

<script>
const YEARS = [2019,2020,2021,2022,2023,2024,2025,2026];
const EXP_TYPES = [
  { id:'part-time', label:'Part-time job', icon:'💼' },
  { id:'internship', label:'Internship / Practice', icon:'🏢' },
  { id:'school', label:'School experience', icon:'🎓' },
  { id:'work', label:'Work experience', icon:'👔' },
];

let currentUser = null;
let currentYear = 2019;
let allData = {};

function storageKey(user) { return 'expJournal_' + user.trim().toLowerCase().replace(/\s+/g,'_'); }
function allUsersKey() { return 'expJournal_users'; }

function loadAllData() {
  try { allData = JSON.parse(localStorage.getItem(allUsersKey()) || '{}'); } catch(e) { allData = {}; }
}
function saveAllData() {
  try { localStorage.setItem(allUsersKey(), JSON.stringify(allData)); } catch(e) {}
}
function getUserData(user) {
  if (!allData[user]) allData[user] = {};
  return allData[user];
}
function getYearData(user, year) {
  const ud = getUserData(user);
  if (!ud[year]) ud[year] = { entries: [] };
  return ud[year];
}
function getSavedUsers() {
  return Object.keys(allData);
}

function enterJournal(name) {
  name = name.trim();
  if (!name) return;
  currentUser = name;
  if (!allData[name]) allData[name] = {};
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainScreen').classList.add('visible');
  document.getElementById('mainTitle').textContent = name + "'s Journal";
  document.getElementById('mainSubtitle').textContent = 'Capturing growth, skills & memories — 2019 onwards';
  renderYearTabs();
  switchYear(2019);
}

function showLogin() {
  currentUser = null;
  document.getElementById('mainScreen').classList.remove('visible');
  document.getElementById('loginScreen').style.display = '';
  document.getElementById('nameInput').value = '';
  renderSavedUsers();
}

function renderSavedUsers() {
  const users = getSavedUsers();
  const section = document.getElementById('savedUsersSection');
  const chips = document.getElementById('savedUserChips');
  if (users.length === 0) { section.style.display = 'none'; return; }
  section.style.display = '';
  chips.innerHTML = users.map(u =>
    `<button class="saved-user-chip" onclick="enterJournal('${u.replace(/'/g,"\\'")}'">${u}</button>`
  ).join('');
}

document.getElementById('loginBtn').addEventListener('click', () => {
  enterJournal(document.getElementById('nameInput').value);
});
document.getElementById('nameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') enterJournal(document.getElementById('nameInput').value);
});
document.getElementById('switchUserBtn').addEventListener('click', () => {
  saveAllData();
  showLogin();
});
document.getElementById('saveBtn').addEventListener('click', () => {
  saveAllData();
  document.getElementById('saveNote').textContent = 'Saved at ' + new Date().toLocaleTimeString();
});

function newEntry() { return { id: Date.now(), type: null, title: '', skills: '', challenges: '', people: [], growth: '', highlight: '', reflection: '' }; }

function renderYearTabs() {
  const tabs = document.getElementById('yearTabs');
  const userYears = Object.keys(getUserData(currentUser)).map(Number).filter(n => !isNaN(n));
  const allYears = [...new Set([...YEARS, ...userYears])].sort((a,b)=>a-b);
  tabs.innerHTML = allYears.map(y =>
    `<button class="year-tab ${y===currentYear?'active':''}" onclick="switchYear(${y})">${y}</button>`
  ).join('') + `<button class="year-tab add-btn" onclick="addCustomYear()">+ year</button>`;
}

function switchYear(y) {
  currentYear = y;
  renderYearTabs();
  renderEntries();
  document.getElementById('addEntryYear').textContent = y;
}

function addCustomYear() {
  const y = parseInt(prompt('Enter year:'));
  if (y && y > 2000 && y < 2060) { switchYear(y); }
}

function renderEntries() {
  const container = document.getElementById('entriesContainer');
  const yd = getYearData(currentUser, currentYear);
  if (!yd.entries || !yd.entries.length) {
    container.innerHTML = `<div class="empty-state">No experiences added for ${currentYear} yet.<br>Click below to add one.</div>`;
    return;
  }
  container.innerHTML = yd.entries.map(e => renderEntry(e)).join('');
  attachEntryListeners();
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function renderEntry(e) {
  const typeButtons = EXP_TYPES.map(t =>
    `<button class="exp-type-btn ${e.type===t.id?'selected':''}" data-eid="${e.id}" data-type="${t.id}">
      <span class="type-icon">${t.icon}</span>${t.label}
    </button>`
  ).join('');
  const peopleTags = (e.people||[]).map((p,i) =>
    `<span class="person-tag">${esc(p)}<button onclick="removePerson(${e.id},${i})">×</button></span>`
  ).join('');
  const detailVis = e.type ? 'visible' : '';
  return `<div class="entry-card" data-eid="${e.id}">
    <div class="card-header">
      <div class="card-title">${esc(e.title) || 'New experience'}</div>
      <button class="delete-btn" onclick="deleteEntry(${e.id})">✕</button>
    </div>
    <div class="section-label">Experience type</div>
    <div class="exp-type-grid">${typeButtons}</div>
    <div class="detail-sections ${detailVis}" id="details-${e.id}">
      <div class="section-label">Title / Organization</div>
      <input type="text" placeholder="e.g. Barista at Blue Bottle, Web dev intern..." value="${esc(e.title)}" data-eid="${e.id}" data-field="title" />
      <div class="section-label">Skills learned</div>
      <textarea rows="2" placeholder="What skills did you pick up?" data-eid="${e.id}" data-field="skills">${esc(e.skills)}</textarea>
      <div class="section-label">Challenges overcome</div>
      <textarea rows="2" placeholder="What was hard? How did you push through it?" data-eid="${e.id}" data-field="challenges">${esc(e.challenges)}</textarea>
      <div class="section-label">People you met</div>
      <div class="people-tags" id="people-${e.id}">${peopleTags}</div>
      <div class="add-person-row">
        <input type="text" id="personInput-${e.id}" placeholder="Name or role (e.g. mentor, teammate)" />
        <button class="add-person-btn" onclick="addPerson(${e.id})">+ Add</button>
      </div>
      <div class="section-label">Personal growth</div>
      <textarea rows="2" placeholder="How did this experience change or shape you?" data-eid="${e.id}" data-field="growth">${esc(e.growth)}</textarea>
      <div class="section-label">✦ Year highlight</div>
      <div class="highlight-box">
        <textarea rows="2" placeholder="What was the standout moment of this experience?" data-eid="${e.id}" data-field="highlight">${esc(e.highlight)}</textarea>
      </div>
      <div class="section-label">Reflection & lessons</div>
      <div class="reflection-box">
        <textarea rows="3" placeholder="Looking back, what do you take away? What would you do differently?" data-eid="${e.id}" data-field="reflection">${esc(e.reflection)}</textarea>
      </div>
    </div>
  </div>`;
}

function attachEntryListeners() {
  document.querySelectorAll('.exp-type-btn').forEach(btn => {
    btn.addEventListener('click', () => updateEntry(parseInt(btn.dataset.eid), 'type', btn.dataset.type));
  });
  document.querySelectorAll('textarea[data-eid], input[type=text][data-eid]').forEach(el => {
    if (!el.id || !el.id.startsWith('personInput')) {
      el.addEventListener('input', () => {
        updateEntry(parseInt(el.dataset.eid), el.dataset.field, el.value);
        if (el.dataset.field === 'title') {
          const card = el.closest('.entry-card');
          if (card) card.querySelector('.card-title').textContent = el.value || 'New experience';
        }
      });
    }
  });
}

function updateEntry(eid, field, value) {
  const yd = getYearData(currentUser, currentYear);
  const entry = yd.entries.find(e => e.id === eid);
  if (!entry) return;
  entry[field] = value;
  if (field === 'type') {
    const detailEl = document.getElementById('details-' + eid);
    if (detailEl) detailEl.classList.add('visible');
    document.querySelectorAll(`.exp-type-btn[data-eid="${eid}"]`).forEach(b => b.classList.remove('selected'));
    document.querySelectorAll(`.exp-type-btn[data-eid="${eid}"][data-type="${value}"]`).forEach(b => b.classList.add('selected'));
  }
}

function addPerson(eid) {
  const inp = document.getElementById('personInput-' + eid);
  const name = inp.value.trim();
  if (!name) return;
  const yd = getYearData(currentUser, currentYear);
  const entry = yd.entries.find(e => e.id === eid);
  if (!entry) return;
  if (!entry.people) entry.people = [];
  entry.people.push(name);
  inp.value = '';
  const container = document.getElementById('people-' + eid);
  if (container) {
    const tag = document.createElement('span');
    tag.className = 'person-tag';
    const idx = entry.people.length - 1;
    tag.innerHTML = `${esc(name)}<button onclick="removePerson(${eid},${idx})">×</button>`;
    container.appendChild(tag);
  }
}

function removePerson(eid, idx) {
  const yd = getYearData(currentUser, currentYear);
  const entry = yd.entries.find(e => e.id === eid);
  if (!entry || !entry.people) return;
  entry.people.splice(idx, 1);
  const container = document.getElementById('people-' + eid);
  if (container) {
    container.querySelectorAll('.person-tag')[idx]?.remove();
    container.querySelectorAll('.person-tag button').forEach((btn, i) => {
      btn.setAttribute('onclick', `removePerson(${eid},${i})`);
    });
  }
}

function deleteEntry(eid) {
  if (!confirm('Remove this experience?')) return;
  const yd = getYearData(currentUser, currentYear);
  yd.entries = yd.entries.filter(e => e.id !== eid);
  renderEntries();
}

document.getElementById('addEntryBtn').addEventListener('click', () => {
  const yd = getYearData(currentUser, currentYear);
  yd.entries.push(newEntry());
  renderEntries();
  setTimeout(() => {
    const cards = document.querySelectorAll('.entry-card');
    if (cards.length) cards[cards.length-1].scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
});

loadAllData();
renderSavedUsers();
</script>
